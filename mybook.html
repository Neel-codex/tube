/* ============================================================
   APP — Main Coordinator
   ============================================================ */
const App = {
  async init() {
    // Apply saved theme
    const saved = localStorage.getItem('orbit-theme') || 'dark';
    this.setTheme(saved);
    // Init data
    await API.init();
    await Auth.init();
    // Register routes
    Router.register('/login', Views.login);
    Router.register('/signup', Views.signup);
    Router.register('/forgot', Views.forgot);
    Router.register('/', () => this.requireAuth(Views.feed));
    Router.register('/feed', () => this.requireAuth(Views.feed));
    Router.register('/explore', () => this.requireAuth(Views.explore));
    Router.register('/messages', () => this.requireAuth(Views.messages));
    Router.register('/messages/:id', (p) => this.requireAuth(() => Views.messages(p)));
    Router.register('/notifications', () => this.requireAuth(Views.notifications));
    Router.register('/profile/me', () => this.requireAuth(() => Views.profile({ id: 'me' })));
    Router.register('/profile/:id', (p) => this.requireAuth(() => Views.profile(p)));
    Router.register('/post/:id', (p) => this.requireAuth(() => Views.postDetail(p)));
    Router.register('/friends', () => this.requireAuth(Views.friends));
    Router.register('/groups', () => this.requireAuth(Views.groups));
    Router.register('/events', () => this.requireAuth(Views.events));
    Router.register('/bookmarks', () => this.requireAuth(Views.bookmarks));
    Router.register('/marketplace', () => this.requireAuth(Views.marketplace));
    Router.register('/settings', () => this.requireAuth(Views.settings));
    Router.register('/admin', () => this.requireAuth(Views.admin));
    Router.register('/404', Views.notFound);
    // Auth guard
    Router.before = async (path) => {
      const publicPaths = ['/login', '/signup', '/forgot'];
      if (!Auth.isLoggedIn() && !publicPaths.includes(path)) return '/login';
      if (Auth.isLoggedIn() && publicPaths.includes(path)) return '/';
      return null;
    };
    Router.init();
    // Show FAB
    if (Auth.isLoggedIn()) document.getElementById('fab').classList.add('show');
    // Service worker for PWA
    this.registerServiceWorker();
    // Realtime subscriptions
    if (SUPABASE_ENABLED) this.subscribeRealtime();
  },
  requireAuth(view) {
    if (!Auth.isLoggedIn()) { Router.navigate('/login'); return; }
    document.getElementById('fab').classList.add('show');
    return view();
  },
  setTheme(theme) {
    document.documentElement.setAttribute('data-theme', theme);
    localStorage.setItem('orbit-theme', theme);
    Store.patch('settings', { theme });
  },
  toggleTheme() {
    const cur = document.documentElement.getAttribute('data-theme');
    this.setTheme(cur === 'dark' ? 'light' : 'dark');
  },
  registerServiceWorker() {
    const swCode = `
      const CACHE = 'orbit-v1';
      self.addEventListener('install', e => self.skipWaiting());
      self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
      self.addEventListener('fetch', e => {
        if (e.request.method !== 'GET') return;
        e.respondWith(
          caches.match(e.request).then(cached => {
            const fetchPromise = fetch(e.request).then(networkRes => {
              if (networkRes && networkRes.status === 200 && e.request.url.startsWith(location.origin)) {
                const clone = networkRes.clone();
                caches.open(CACHE).then(c => c.put(e.request, clone));
              }
              return networkRes;
            }).catch(() => cached);
            return cached || fetchPromise;
          })
        );
      });`;
    try {
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const url = URL.createObjectURL(blob);
      if ('serviceWorker' in navigator) navigator.serviceWorker.register(url).catch(() => {});
    } catch (e) {}
  },
  subscribeRealtime() {
    if (!supabaseClient) return;
    // New posts
    supabaseClient.channel('public:posts')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'posts' }, payload => {
        if (Router.current === '/' || Router.current === '/feed') {
          Toast.show('info', 'New post', 'Refresh to see updates');
        }
      }).subscribe();
    // Notifications
    supabaseClient.channel('public:notifications')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'notifications' }, payload => {
        const badge = document.getElementById('notif-badge');
        if (badge) badge.textContent = (parseInt(badge.textContent) || 0) + 1;
        Toast.show('info', 'New notification', payload.new?.body || '');
      }).subscribe();
    // Messages
    supabaseClient.channel('public:messages')
      .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages' }, payload => {
        // append to active chat
      }).subscribe();
    // Presence
    supabaseClient.channel('online-users')
      .on('presence', { event: 'sync' }, () => {
        const state = supabaseClient.channel('online-users').presenceState();
        Store.set('onlineUsers', new Set(Object.keys(state)));
      }).subscribe(async status => {
        if (status === 'SUBSCRIBED') {
          await supabaseClient.channel('online-users').track({ user_id: Store.get('user')?.id, online_at: new Date().toISOString() });
        }
      });
  }
};

/* ---------------- Post Detail View ---------------- */
Views.postDetail = async (params) => {
  await Views.app();
  const main = document.getElementById('main-content');
  const post = (Store.get('posts') || []).find(p => p.id === params.id);
  if (!post) {
    main.innerHTML = Views.emptyState('comment', 'Post not found', 'It may have been removed');
    return;
  }
  main.innerHTML = Views.postCard(post);
  // Auto-expand comments
  const box = document.querySelector(`[data-comments="${post.id}"]`);
  if (box) box.style.display = 'block';
  Views.bindPostActions();
};

/* ---------------- Expose for inline handlers ---------------- */
window.Components = Components;
window.Router = Router;
window.Toast = Toast;
window.__orbit_nav = (path) => Router.navigate(path);

/* ---------------- Bootstrap ---------------- */
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', () => App.init());
} else {
  App.init();
}
</script>
