<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="Orbit — A modern social network. Connect, share, and orbit around what matters.">
<meta name="theme-color" content="#6366f1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Orbit — Social Network</title>

<link rel="manifest" href='data:application/manifest+json,{"name":"Orbit","short_name":"Orbit","start_url":".","display":"standalone","background_color":"%230a0e1a","theme_color":"%236366f1","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 100 100%27%3E%3Cdefs%3E%3ClinearGradient id=%27g%27 x1=%270%27 y1=%270%27 x2=%271%27 y2=%271%27%3E%3Cstop offset=%270%27 stop-color=%27%236366f1%27/%3E%3Cstop offset=%271%27 stop-color=%27%23ec4899%27/%3E%3C/linearGradient%3E%3C/defs%3E%3Ccircle cx=%2750%27 cy=%2750%27 r=%2730%27 fill=%27url(%23g)%27/%3E%3Cellipse cx=%2750%27 cy=%2750%27 rx=%2745%27 ry=%2718%27 fill=%27none%27 stroke=%27url(%23g)%27 stroke-width=%274%27 transform=%27rotate(-25 50 50)%27/%3E%3C/svg%3E","sizes":"512x512","type":"image/svg+xml"}]}'>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
/* ============================================================
   ORBIT — Design System
   ============================================================ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#6366f1;--primary-2:#8b5cf6;--primary-hover:#4f46e5;
  --accent:#ec4899;--accent-2:#f43f5e;
  --gradient:linear-gradient(135deg,#6366f1 0%,#8b5cf6 50%,#ec4899 100%);
  --gradient-soft:linear-gradient(135deg,rgba(99,102,241,.12),rgba(236,72,153,.12));
  --success:#10b981;--warning:#f59e0b;--danger:#ef4444;--info:#3b82f6;
  --bg:#f6f7fb;--bg-elev:#ffffff;--bg-elev-2:#f1f3f9;--bg-glass:rgba(255,255,255,.72);
  --bg-hover:rgba(0,0,0,.04);--bg-active:rgba(99,102,241,.08);
  --text:#0f172a;--text-2:#475569;--text-3:#94a3b8;
  --border:rgba(15,23,42,.08);--border-strong:rgba(15,23,42,.14);
  --shadow-sm:0 1px 2px rgba(15,23,42,.04);
  --shadow:0 4px 14px rgba(15,23,42,.06);
  --shadow-lg:0 20px 50px rgba(15,23,42,.12);
  --shadow-glow:0 0 50px rgba(99,102,241,.25);
  --radius-sm:8px;--radius:14px;--radius-lg:20px;--radius-xl:28px;
  --sidebar-w:260px;--right-w:320px;--nav-h:64px;
  --font:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);--ease-spring:cubic-bezier(.34,1.56,.64,1);
  --maxw:1280px;
}
[data-theme="dark"]{
  --bg:#0a0e1a;--bg-elev:#131826;--bg-elev-2:#1c2333;
  --bg-glass:rgba(19,24,38,.72);--bg-hover:rgba(255,255,255,.04);
  --bg-active:rgba(99,102,241,.16);
  --text:#f1f5f9;--text-2:#cbd5e1;--text-3:#64748b;
  --border:rgba(255,255,255,.08);--border-strong:rgba(255,255,255,.14);
  --shadow:0 4px 14px rgba(0,0,0,.4);--shadow-lg:0 20px 50px rgba(0,0,0,.5);
  --shadow-glow:0 0 60px rgba(99,102,241,.35);
}
html,body{height:100%}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  line-height:1.5;-webkit-font-smoothing:antialiased;overflow-x:hidden;
  transition:background .4s var(--ease),color .4s var(--ease)}
body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:-1;
  background:
    radial-gradient(circle at 0% 0%,rgba(99,102,241,.08),transparent 40%),
    radial-gradient(circle at 100% 100%,rgba(236,72,153,.06),transparent 40%);
  transition:opacity .4s var(--ease)}
[data-theme="dark"] body::before{opacity:1.4}
a{color:inherit;text-decoration:none}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}
img{display:block;max-width:100%}
::selection{background:var(--primary);color:#fff}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:5px;border:2px solid transparent;background-clip:padding-box}
::-webkit-scrollbar-thumb:hover{background:var(--text-3);background-clip:padding-box;border:2px solid transparent}

/* ============================================================
   LAYOUT
   ============================================================ */
#app{min-height:100vh}
.app-shell{display:grid;grid-template-columns:var(--sidebar-w) 1fr var(--right-w);
  grid-template-rows:var(--nav-h) 1fr;grid-template-areas:"nav nav nav" "left main right";
  min-height:100vh;gap:0}
.topbar{grid-area:nav;position:sticky;top:0;z-index:100;
  background:var(--bg-glass);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:1px solid var(--border);display:flex;align-items:center;
  padding:0 20px;gap:18px}
.sidebar{grid-area:left;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));
  overflow-y:auto;padding:18px 12px;border-right:1px solid var(--border)}
.right-rail{grid-area:right;position:sticky;top:var(--nav-h);height:calc(100vh - var(--nav-h));
  overflow-y:auto;padding:18px 12px;border-left:1px solid var(--border)}
.main{grid-area:main;padding:18px;max-width:720px;width:100%;margin:0 auto}
@media(max-width:1100px){.app-shell{grid-template-columns:var(--sidebar-w) 1fr;grid-template-areas:"nav nav" "left main"}.right-rail{display:none}}
@media(max-width:760px){.app-shell{grid-template-columns:1fr;grid-template-areas:"nav" "main"}.sidebar{display:none}.main{padding:12px}}

/* ============================================================
   TOPBAR
   ============================================================ */
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;letter-spacing:-.02em}
.brand-logo{width:36px;height:36px;border-radius:11px;background:var(--gradient);display:grid;place-items:center;position:relative;box-shadow:0 4px 14px rgba(99,102,241,.4)}
.brand-logo svg{width:22px;height:22px}
.brand-name{background:var(--gradient);-webkit-background-clip:text;background-clip:text;color:transparent}
.search-bar{flex:1;max-width:520px;position:relative}
.search-bar input{width:100%;height:42px;border-radius:12px;border:1px solid var(--border);
  background:var(--bg-elev);padding:0 16px 0 44px;color:var(--text);transition:all .25s var(--ease)}
.search-bar input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,.15)}
.search-bar .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-3);width:18px;height:18px}
.search-results{position:absolute;top:calc(100% + 8px);left:0;right:0;background:var(--bg-elev);
  border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-lg);overflow:hidden;
  max-height:420px;overflow-y:auto;z-index:200;opacity:0;transform:translateY(-6px);pointer-events:none;transition:all .2s var(--ease)}
.search-results.active{opacity:1;transform:translateY(0);pointer-events:auto}
.search-section{padding:8px}
.search-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);padding:8px 12px 4px}
.search-item{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:10px;cursor:pointer;transition:background .15s}
.search-item:hover{background:var(--bg-hover)}
.topbar-actions{display:flex;align-items:center;gap:6px;margin-left:auto}
.icon-btn{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;color:var(--text-2);position:relative;transition:all .2s var(--ease)}
.icon-btn:hover{background:var(--bg-hover);color:var(--text)}
.icon-btn svg{width:22px;height:22px}
.icon-btn .badge{position:absolute;top:6px;right:6px;min-width:18px;height:18px;padding:0 5px;border-radius:9px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center;border:2px solid var(--bg-elev)}
.theme-toggle{position:relative;overflow:hidden}
.theme-toggle .sun,.theme-toggle .moon{position:absolute;transition:transform .4s var(--ease-spring),opacity .3s}
[data-theme="dark"] .theme-toggle .sun{transform:translateY(-30px) rotate(90deg);opacity:0}
[data-theme="light"] .theme-toggle .moon{transform:translateY(30px) rotate(-90deg);opacity:0}
.user-chip{display:flex;align-items:center;gap:10px;padding:4px 12px 4px 4px;border-radius:30px;background:var(--bg-elev);border:1px solid var(--border);cursor:pointer;transition:all .2s var(--ease)}
.user-chip:hover{border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,.1)}
.user-chip .avatar{width:32px;height:32px}
.user-chip .name{font-weight:600;font-size:14px}
.mobile-menu-btn{display:none}
@media(max-width:760px){.mobile-menu-btn{display:grid}.brand-name{display:none}.search-bar{max-width:none}.user-chip .name{display:none}.topbar-actions .icon-btn:not(.theme-toggle):not(.notif-btn){display:none}}

/* ============================================================
   AVATARS
   ============================================================ */
.avatar{border-radius:50%;background:var(--gradient);display:grid;place-items:center;color:#fff;font-weight:700;overflow:hidden;flex-shrink:0;position:relative}
.avatar img{width:100%;height:100%;object-fit:cover}
.avatar.ring{padding:2px;background:var(--gradient)}
.avatar.ring>div,.avatar.ring>img{width:100%;height:100%;border-radius:50%;border:2px solid var(--bg-elev);background:var(--bg-elev)}
.avatar.online::after{content:"";position:absolute;bottom:0;right:0;width:30%;height:30%;background:var(--success);border:2px solid var(--bg-elev);border-radius:50%}

/* ============================================================
   SIDEBAR
   ============================================================ */
.nav-list{display:flex;flex-direction:column;gap:2px}
.nav-item{display:flex;align-items:center;gap:14px;padding:12px 14px;border-radius:12px;color:var(--text-2);font-weight:500;font-size:15px;cursor:pointer;transition:all .2s var(--ease);position:relative}
.nav-item:hover{background:var(--bg-hover);color:var(--text)}
.nav-item.active{background:var(--bg-active);color:var(--primary)}
.nav-item.active::before{content:"";position:absolute;left:-12px;top:50%;transform:translateY(-50%);width:4px;height:24px;background:var(--gradient);border-radius:0 4px 4px 0}
.nav-item svg{width:24px;height:24px;flex-shrink:0}
.nav-item .badge{margin-left:auto;min-width:20px;height:20px;padding:0 6px;border-radius:10px;background:var(--accent);color:#fff;font-size:11px;font-weight:700;display:grid;place-items:center}
.sidebar-section{margin-top:24px}
.sidebar-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);padding:0 14px 8px}
.friend-mini{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:10px;cursor:pointer;transition:background .15s}
.friend-mini:hover{background:var(--bg-hover)}
.friend-mini .info{flex:1;min-width:0}
.friend-mini .name{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.friend-mini .status{font-size:12px;color:var(--text-3)}
.create-post-btn{width:100%;padding:12px;border-radius:14px;background:var(--gradient);color:#fff;font-weight:600;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 20px rgba(99,102,241,.3);transition:transform .2s var(--ease-spring),box-shadow .2s}
.create-post-btn:hover{transform:translateY(-2px);box-shadow:0 12px 28px rgba(99,102,241,.4)}
.create-post-btn:active{transform:translateY(0)}

/* ============================================================
   CARDS
   ============================================================ */
.card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:border-color .2s,box-shadow .2s}
.card.glass{background:var(--bg-glass);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px)}
.card.pad{padding:18px}
.card + .card{margin-top:16px}

/* ============================================================
   FEED
   ============================================================ */
.composer{padding:16px}
.composer-top{display:flex;gap:12px;align-items:center}
.composer-input{flex:1;height:42px;border-radius:12px;border:1px solid var(--border);background:var(--bg-elev-2);padding:0 16px;color:var(--text);cursor:text;transition:all .2s}
.composer-input:hover{border-color:var(--border-strong)}
.composer-actions{display:flex;gap:6px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.composer-action{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;border-radius:10px;color:var(--text-2);font-weight:500;font-size:14px;transition:background .15s}
.composer-action:hover{background:var(--bg-hover)}
.composer-action svg{width:20px;height:20px}

/* Feed tabs */
.feed-tabs{display:flex;gap:4px;padding:8px;background:var(--bg-elev-2);border-radius:12px;margin-bottom:16px}
.feed-tab{flex:1;padding:10px;border-radius:9px;text-align:center;font-weight:600;font-size:14px;color:var(--text-2);cursor:pointer;transition:all .2s}
.feed-tab.active{background:var(--bg-elev);color:var(--text);box-shadow:var(--shadow-sm)}

/* Posts */
.post{padding:18px}
.post-header{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.post-author{flex:1;min-width:0}
.post-author .name{font-weight:700;font-size:15px;display:flex;align-items:center;gap:6px}
.post-author .verified{width:16px;height:16px;color:var(--info)}
.post-author .meta{font-size:13px;color:var(--text-3);display:flex;align-items:center;gap:6px}
.post-author .meta .dot{width:3px;height:3px;border-radius:50%;background:currentColor}
.post-body{font-size:15px;line-height:1.6;white-space:pre-wrap;word-wrap:break-word;margin-bottom:12px}
.post-body .hashtag,.post-body .mention{color:var(--primary);font-weight:600;cursor:pointer}
.post-body .hashtag:hover,.post-body .mention:hover{text-decoration:underline}
.post-media{display:grid;gap:4px;margin-bottom:12px;border-radius:14px;overflow:hidden}
.post-media.single img,.post-media.single video{width:100%;max-height:540px;object-fit:cover}
.post-media.grid-2{grid-template-columns:1fr 1fr;aspect-ratio:2/1}
.post-media.grid-3{grid-template-columns:2fr 1fr;grid-template-rows:1fr 1fr;aspect-ratio:16/10}
.post-media.grid-4{grid-template-columns:1fr 1fr;aspect-ratio:1}
.post-media .media-item{position:relative;overflow:hidden;cursor:pointer}
.post-media .media-item img,.post-media .media-item video{width:100%;height:100%;object-fit:cover;transition:transform .4s var(--ease)}
.post-media .media-item:hover img,.post-media .media-item:hover video{transform:scale(1.04)}
.post-media.grid-3 .media-item:first-child{grid-row:1/3}
.post-media .more-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:grid;place-items:center;color:#fff;font-size:28px;font-weight:700}
.post-poll{margin-bottom:12px}
.poll-option{padding:12px 14px;border:2px solid var(--border);border-radius:12px;margin-bottom:8px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
.poll-option:hover{border-color:var(--primary)}
.poll-option.voted{border-color:var(--primary)}
.poll-fill{position:absolute;left:0;top:0;bottom:0;background:var(--gradient-soft);transition:width .6s var(--ease)}
.poll-content{position:relative;display:flex;justify-content:space-between;align-items:center}
.post-stats{display:flex;align-items:center;gap:6px;padding:8px 0;color:var(--text-3);font-size:13px;border-bottom:1px solid var(--border);margin-bottom:4px}
.post-stats .reactions-display{display:flex;align-items:center;gap:-2px}
.post-stats .reaction-emoji{width:20px;height:20px;border-radius:50%;background:var(--bg-elev);display:grid;place-items:center;font-size:11px;border:1.5px solid var(--bg-elev);margin-left:-4px}
.post-stats .reaction-emoji:first-child{margin-left:0}
.post-actions{display:flex;justify-content:space-around;padding-top:4px}
.post-action{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:8px;border-radius:10px;color:var(--text-2);font-weight:600;font-size:14px;transition:all .2s;position:relative}
.post-action:hover{background:var(--bg-hover)}
.post-action.active{color:var(--accent)}
.post-action svg{width:20px;height:20px}
.reaction-picker{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(8px);background:var(--bg-elev);border:1px solid var(--border);border-radius:30px;padding:6px;display:flex;gap:2px;box-shadow:var(--shadow-lg);opacity:0;pointer-events:none;transition:all .25s var(--ease-spring);z-index:50}
.reaction-picker.active{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
.reaction-emoji-btn{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-size:24px;cursor:pointer;transition:transform .2s var(--ease-spring)}
.reaction-emoji-btn:hover{transform:scale(1.3) translateY(-4px)}

/* Comments */
.comments{padding:0 18px 18px}
.comment{display:flex;gap:10px;padding:10px 0}
.comment-body{flex:1;background:var(--bg-elev-2);padding:10px 14px;border-radius:14px}
.comment-author{font-weight:700;font-size:14px}
.comment-text{font-size:14px;margin-top:2px}
.comment-meta{font-size:12px;color:var(--text-3);margin-top:4px;display:flex;gap:12px}
.comment-meta button{font-weight:600;color:var(--text-2);transition:color .15s}
.comment-meta button:hover{color:var(--primary)}
.comment-input{display:flex;gap:10px;padding-top:10px;border-top:1px solid var(--border);margin-top:8px}
.comment-input input{flex:1;height:38px;border-radius:19px;border:1px solid var(--border);background:var(--bg-elev-2);padding:0 16px}

/* ============================================================
   RIGHT RAIL
   ============================================================ */
.rail-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px;margin-bottom:14px}
.rail-title{font-weight:700;font-size:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.trend-item{padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.trend-item:last-child{border-bottom:none}
.trend-item:hover{color:var(--primary)}
.trend-topic{font-size:13px;color:var(--text-3);font-weight:600}
.trend-tag{font-weight:700;margin:2px 0}
.trend-count{font-size:12px;color:var(--text-3)}
.suggestion-item{display:flex;align-items:center;gap:10px;padding:8px 0}
.suggestion-item .info{flex:1;min-width:0}
.suggestion-item .name{font-weight:600;font-size:14px}
.suggestion-item .mutual{font-size:12px;color:var(--text-3)}
.btn-follow{padding:6px 14px;border-radius:10px;background:var(--primary);color:#fff;font-weight:600;font-size:13px;transition:all .2s}
.btn-follow:hover{background:var(--primary-hover)}
.btn-follow.following{background:var(--bg-elev-2);color:var(--text);border:1px solid var(--border)}

/* ============================================================
   BUTTONS
   ============================================================ */
.btn{padding:10px 18px;border-radius:12px;font-weight:600;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .2s var(--ease);border:1px solid transparent;cursor:pointer}
.btn-primary{background:var(--gradient);color:#fff;box-shadow:0 6px 16px rgba(99,102,241,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 10px 22px rgba(99,102,241,.4)}
.btn-secondary{background:var(--bg-elev-2);color:var(--text);border-color:var(--border)}
.btn-secondary:hover{background:var(--bg-hover);border-color:var(--border-strong)}
.btn-ghost{background:transparent;color:var(--text-2)}
.btn-ghost:hover{background:var(--bg-hover);color:var(--text)}
.btn-danger{background:var(--danger);color:#fff}
.btn-danger:hover{background:#dc2626}
.btn-icon{width:42px;height:42px;padding:0}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:10px}
.btn-lg{padding:14px 24px;font-size:16px;border-radius:14px}
.btn-block{width:100%}
.btn:disabled{opacity:.55;cursor:not-allowed;transform:none!important}

/* ============================================================
   FORMS
   ============================================================ */
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-2);margin-bottom:6px}
.form-input,.form-textarea,.form-select{width:100%;padding:12px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-elev-2);color:var(--text);transition:all .2s}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 4px rgba(99,102,241,.12);background:var(--bg-elev)}
.form-textarea{resize:vertical;min-height:90px;font-family:inherit}
.form-hint{font-size:12px;color:var(--text-3);margin-top:4px}
.form-error{font-size:12px;color:var(--danger);margin-top:4px}
.input-group{position:relative}
.input-group .icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--text-3)}
.input-group .form-input{padding-left:42px}
.input-group .toggle-pass{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--text-3);cursor:pointer}
.checkbox{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px}
.checkbox input{width:18px;height:18px;accent-color:var(--primary)}

/* ============================================================
   AUTH PAGES
   ============================================================ */
.auth-wrap{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;gap:0}
.auth-aside{background:var(--gradient);position:relative;overflow:hidden;color:#fff;padding:60px;display:flex;flex-direction:column;justify-content:center}
.auth-aside::before,.auth-aside::after{content:"";position:absolute;border-radius:50%;background:rgba(255,255,255,.1)}
.auth-aside::before{width:600px;height:600px;top:-200px;right:-200px}
.auth-aside::after{width:400px;height:400px;bottom:-150px;left:-100px;background:rgba(255,255,255,.06)}
.auth-aside-content{position:relative;z-index:1;max-width:480px}
.auth-aside h1{font-size:48px;line-height:1.1;margin-bottom:20px;font-weight:800;letter-spacing:-.02em}
.auth-aside p{font-size:18px;opacity:.9;line-height:1.6}
.auth-aside .features{margin-top:40px;display:flex;flex-direction:column;gap:16px}
.auth-aside .feature{display:flex;align-items:center;gap:12px;font-size:15px}
.auth-aside .feature svg{width:24px;height:24px;flex-shrink:0}
.auth-main{display:grid;place-items:center;padding:40px;background:var(--bg)}
.auth-card{width:100%;max-width:420px}
.auth-card h2{font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:-.02em}
.auth-card .sub{color:var(--text-2);margin-bottom:28px}
.auth-divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:var(--text-3);font-size:13px}
.auth-divider::before,.auth-divider::after{content:"";flex:1;height:1px;background:var(--border)}
.oauth-row{display:flex;gap:10px}
.oauth-btn{flex:1;padding:11px;border-radius:12px;border:1px solid var(--border);background:var(--bg-elev);display:flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:14px;transition:all .2s}
.oauth-btn:hover{border-color:var(--primary);background:var(--bg-hover)}
.oauth-btn svg{width:18px;height:18px}
.auth-foot{text-align:center;margin-top:20px;font-size:14px;color:var(--text-2)}
.auth-foot a{color:var(--primary);font-weight:600}
@media(max-width:880px){.auth-wrap{grid-template-columns:1fr}.auth-aside{display:none}}

/* ============================================================
   MODALS
   ============================================================ */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);display:grid;place-items:center;z-index:1000;padding:20px;opacity:0;transition:opacity .25s var(--ease)}
.modal-backdrop.active{opacity:1}
.modal{background:var(--bg-elev);border-radius:var(--radius-xl);max-width:560px;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;transform:scale(.95) translateY(10px);transition:transform .3s var(--ease-spring);box-shadow:var(--shadow-lg)}
.modal-backdrop.active .modal{transform:scale(1) translateY(0)}
.modal-header{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:between;gap:12px}
.modal-header h3{flex:1;font-size:18px;font-weight:700}
.modal-body{padding:22px;overflow-y:auto;flex:1}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:10px}
.modal-close{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--text-2);transition:background .15s}
.modal-close:hover{background:var(--bg-hover)}

/* ============================================================
   TOASTS
   ============================================================ */
.toast-container{position:fixed;top:80px;right:20px;z-index:2000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{background:var(--bg-elev);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;box-shadow:var(--shadow-lg);min-width:280px;max-width:380px;pointer-events:auto;animation:toastIn .35s var(--ease-spring)}
.toast.success{border-left:4px solid var(--success)}
.toast.error{border-left:4px solid var(--danger)}
.toast.info{border-left:4px solid var(--info)}
.toast.warning{border-left:4px solid var(--warning)}
.toast .icon{width:24px;height:24px;flex-shrink:0}
.toast.success .icon{color:var(--success)}
.toast.error .icon{color:var(--danger)}
.toast.info .icon{color:var(--info)}
.toast.warning .icon{color:var(--warning)}
.toast .content{flex:1;font-size:14px}
.toast .title{font-weight:700}
.toast .message{color:var(--text-2);font-size:13px;margin-top:2px}
.toast.removing{animation:toastOut .3s var(--ease) forwards}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{to{transform:translateX(120%);opacity:0}}

/* ============================================================
   PROFILE PAGE
   ============================================================ */
.profile-header{margin-bottom:16px}
.profile-cover{height:280px;border-radius:var(--radius-lg);background:var(--gradient);position:relative;overflow:hidden}
.profile-cover img{width:100%;height:100%;object-fit:cover}
.profile-cover .edit-cover{position:absolute;bottom:16px;right:16px;background:rgba(0,0,0,.6);color:#fff;padding:8px 14px;border-radius:10px;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px;backdrop-filter:blur(10px)}
.profile-info-bar{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-lg);padding:0 22px 22px;margin-top:-60px;position:relative;z-index:2}
.profile-avatar-row{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:14px}
.profile-avatar{width:140px;height:140px;border-radius:50%;border:5px solid var(--bg-elev);background:var(--gradient);overflow:hidden}
.profile-avatar img{width:100%;height:100%;object-fit:cover}
.profile-actions{display:flex;gap:8px}
.profile-name-row{display:flex;align-items:center;gap:8px}
.profile-name{font-size:26px;font-weight:800}
.profile-username{color:var(--text-3);font-size:15px;margin-bottom:8px}
.profile-bio{font-size:15px;line-height:1.6;margin-bottom:14px;max-width:640px}
.profile-meta{display:flex;gap:18px;color:var(--text-2);font-size:14px;flex-wrap:wrap}
.profile-meta span{display:flex;align-items:center;gap:6px}
.profile-meta svg{width:16px;height:16px;color:var(--text-3)}
.profile-stats{display:flex;gap:24px;padding:14px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-top:14px}
.profile-stat{cursor:pointer}
.profile-stat .num{font-weight:800;font-size:18px}
.profile-stat .label{font-size:13px;color:var(--text-3)}
.profile-tabs{display:flex;gap:4px;margin:16px 0;border-bottom:1px solid var(--border)}
.profile-tab{padding:12px 18px;font-weight:600;color:var(--text-2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.profile-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
.profile-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.profile-grid .photo{aspect-ratio:1;border-radius:6px;overflow:hidden;cursor:pointer;position:relative}
.profile-grid .photo img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.profile-grid .photo:hover img{transform:scale(1.05)}

/* ============================================================
   MESSAGES
   ============================================================ */
.msg-layout{display:grid;grid-template-columns:320px 1fr;height:calc(100vh - var(--nav-h) - 36px);background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.conv-list{border-right:1px solid var(--border);display:flex;flex-direction:column}
.conv-list-header{padding:16px;border-bottom:1px solid var(--border)}
.conv-list-header h3{font-size:20px;font-weight:800;margin-bottom:12px}
.conv-search{width:100%;padding:10px 14px;border-radius:10px;border:1px solid var(--border);background:var(--bg-elev-2)}
.conv-item{display:flex;gap:10px;padding:12px 16px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.conv-item:hover{background:var(--bg-hover)}
.conv-item.active{background:var(--bg-active)}
.conv-item .info{flex:1;min-width:0}
.conv-item .top-row{display:flex;justify-content:space-between;align-items:center}
.conv-item .name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item .time{font-size:11px;color:var(--text-3);flex-shrink:0}
.conv-item .preview{font-size:13px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-item .unread{background:var(--primary);color:#fff;font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:grid;place-items:center;padding:0 5px}
.chat-pane{display:flex;flex-direction:column;min-width:0}
.chat-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.chat-header .info{flex:1}
.chat-header .name{font-weight:700}
.chat-header .status{font-size:12px;color:var(--success)}
.chat-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:10px;background:var(--bg)}
.chat-bubble{max-width:70%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-wrap:break-word;animation:msgIn .25s var(--ease-spring)}
.chat-bubble.them{background:var(--bg-elev);border:1px solid var(--border);border-bottom-left-radius:6px;align-self:flex-start}
.chat-bubble.me{background:var(--gradient);color:#fff;border-bottom-right-radius:6px;align-self:flex-end}
.chat-bubble .time{font-size:10px;opacity:.7;margin-top:4px;display:block}
.chat-date{text-align:center;color:var(--text-3);font-size:12px;margin:14px 0;position:relative}
.chat-date::before{content:"";position:absolute;left:0;right:0;top:50%;height:1px;background:var(--border);z-index:-1}
.chat-date span{background:var(--bg);padding:0 12px}
@keyframes msgIn{from{transform:translateY(8px) scale(.95);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}
.chat-input-bar{padding:14px 18px;border-top:1px solid var(--border);display:flex;gap:10px;align-items:center}
.chat-input{flex:1;padding:11px 16px;border-radius:22px;border:1px solid var(--border);background:var(--bg-elev-2)}
.typing-indicator{display:flex;gap:4px;padding:8px 14px}
.typing-indicator span{width:8px;height:8px;background:var(--text-3);border-radius:50%;animation:typing 1.2s infinite}
.typing-indicator span:nth-child(2){animation-delay:.2s}
.typing-indicator span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
@media(max-width:760px){.msg-layout{grid-template-columns:1fr}.conv-list.hide-mobile{display:none}.chat-pane.hide-mobile{display:none}}

/* ============================================================
   NOTIFICATIONS
   ============================================================ */
.notif-item{display:flex;gap:12px;padding:14px;border-radius:12px;cursor:pointer;transition:background .15s;border-bottom:1px solid var(--border)}
.notif-item:hover{background:var(--bg-hover)}
.notif-item.unread{background:var(--bg-active)}
.notif-icon{width:40px;height:40px;border-radius:50%;background:var(--gradient-soft);display:grid;place-items:center;color:var(--primary);flex-shrink:0}
.notif-icon svg{width:20px;height:20px}
.notif-content{flex:1}
.notif-text{font-size:14px;line-height:1.4}
.notif-text b{font-weight:700}
.notif-time{font-size:12px;color:var(--text-3);margin-top:2px}

/* ============================================================
   STORIES
   ============================================================ */
.stories-row{display:flex;gap:10px;overflow-x:auto;padding:4px 0 14px;scrollbar-width:none}
.stories-row::-webkit-scrollbar{display:none}
.story{min-width:110px;height:180px;border-radius:var(--radius);position:relative;overflow:hidden;cursor:pointer;flex-shrink:0;background:var(--bg-elev-2)}
.story img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.story:hover img{transform:scale(1.05)}
.story::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.7),transparent 50%)}
.story.add{display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px dashed var(--border-strong);background:var(--bg-elev);color:var(--text-2)}
.story.add .plus{width:44px;height:44px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;font-size:24px;margin-bottom:6px}
.story-info{position:absolute;bottom:8px;left:8px;right:8px;color:#fff;z-index:1}
.story-info .name{font-size:13px;font-weight:700;text-shadow:0 1px 4px rgba(0,0,0,.5);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.story-ring{position:absolute;top:8px;left:8px;z-index:1}
.story-ring .avatar{width:32px;height:32px;border:2.5px solid var(--gradient);border-radius:50%;padding:0}
.story-ring .avatar>img{border-radius:50%}

/* ============================================================
   SKELETON
   ============================================================ */
.skeleton{background:linear-gradient(90deg,var(--bg-elev-2) 25%,var(--bg-hover) 50%,var(--bg-elev-2) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.sk-line{height:12px;margin-bottom:8px}
.sk-line.short{width:50%}
.sk-circle{width:48px;height:48px;border-radius:50%}
.sk-post{padding:18px}

/* ============================================================
   UTILITIES
   ============================================================ */
.flex{display:flex}.flex-col{flex-direction:column}.items-center{align-items:center}.justify-between{justify-content:space-between}.justify-center{justify-content:center}.gap-2{gap:8px}.gap-3{gap:12px}.gap-4{gap:16px}.mt-2{margin-top:8px}.mt-3{margin-top:12px}.mt-4{margin-top:16px}.mb-2{margin-bottom:8px}.mb-3{margin-bottom:12px}.mb-4{margin-bottom:16px}.text-sm{font-size:13px}.text-xs{font-size:12px}.text-muted{color:var(--text-3)}.text-center{text-align:center}.font-bold{font-weight:700}.font-semibold{font-weight:600}.hidden{display:none!important}.truncate{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.glass{background:var(--bg-glass);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px)}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;color:var(--text-3)}
.empty-state svg{width:80px;height:80px;margin-bottom:14px;opacity:.5}
.empty-state h3{font-size:18px;font-weight:700;color:var(--text-2);margin-bottom:6px}
.empty-state p{font-size:14px;max-width:340px;margin:0 auto}

/* Spinner */
.spinner{width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-overlay{position:fixed;inset:0;background:var(--bg-glass);backdrop-filter:blur(10px);display:grid;place-items:center;z-index:3000;opacity:0;pointer-events:none;transition:opacity .25s}
.loading-overlay.active{opacity:1;pointer-events:auto}

/* FAB */
.fab{position:fixed;bottom:24px;right:24px;width:56px;height:56px;border-radius:50%;background:var(--gradient);color:#fff;display:grid;place-items:center;box-shadow:0 12px 30px rgba(99,102,241,.4);z-index:50;transform:scale(0);transition:transform .3s var(--ease-spring)}
.fab.show{transform:scale(1)}
.fab:hover{transform:scale(1.08)}
.fab svg{width:26px;height:26px}

/* Context menu */
.context-menu{position:fixed;background:var(--bg-elev);border:1px solid var(--border);border-radius:12px;padding:6px;box-shadow:var(--shadow-lg);z-index:1500;min-width:180px;animation:menuIn .15s var(--ease)}
@keyframes menuIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
.context-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;font-size:14px;transition:background .15s}
.context-item:hover{background:var(--bg-hover)}
.context-item.danger{color:var(--danger)}
.context-item svg{width:18px;height:18px}

/* Settings */
.settings-layout{display:grid;grid-template-columns:240px 1fr;gap:20px}
.settings-nav{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-lg);padding:10px;height:fit-content;position:sticky;top:calc(var(--nav-h) + 18px)}
.settings-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-2);transition:all .15s}
.settings-nav-item:hover{background:var(--bg-hover)}
.settings-nav-item.active{background:var(--bg-active);color:var(--primary)}
.settings-content{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px}
.settings-section h3{font-size:18px;font-weight:700;margin-bottom:6px}
.settings-section p{color:var(--text-2);font-size:14px;margin-bottom:20px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border-bottom:none}
.setting-row .label{font-weight:600;font-size:14px}
.setting-row .desc{font-size:13px;color:var(--text-3);margin-top:2px}
.switch{position:relative;width:44px;height:26px;flex-shrink:0}
.switch input{opacity:0;width:0;height:0}
.switch .slider{position:absolute;inset:0;background:var(--border-strong);border-radius:13px;transition:background .25s;cursor:pointer}
.switch .slider::before{content:"";position:absolute;width:20px;height:20px;border-radius:50%;background:#fff;top:3px;left:3px;transition:transform .25s var(--ease-spring);box-shadow:0 2px 4px rgba(0,0,0,.2)}
.switch input:checked + .slider{background:var(--primary)}
.switch input:checked + .slider::before{transform:translateX(18px)}
@media(max-width:760px){.settings-layout{grid-template-columns:1fr}.settings-nav{position:static;display:flex;overflow-x:auto}}

/* Admin */
.admin-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.admin-stat{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-lg);padding:18px}
.admin-stat .label{font-size:13px;color:var(--text-3);font-weight:600}
.admin-stat .num{font-size:28px;font-weight:800;margin-top:6px}
.admin-stat .delta{font-size:12px;color:var(--success);margin-top:4px;display:flex;align-items:center;gap:4px}
.admin-stat .delta.down{color:var(--danger)}
@media(max-width:760px){.admin-stats{grid-template-columns:repeat(2,1fr)}}
.admin-table{width:100%;border-collapse:collapse}
.admin-table th,.admin-table td{padding:12px 14px;text-align:left;border-bottom:1px solid var(--border);font-size:14px}
.admin-table th{font-size:12px;text-transform:uppercase;letter-spacing:.05em;color:var(--text-3);font-weight:700}
.admin-table tr:hover td{background:var(--bg-hover)}
.tag{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.tag.active{background:rgba(16,185,129,.15);color:var(--success)}
.tag.pending{background:rgba(245,158,11,.15);color:var(--warning)}
.tag.suspended{background:rgba(239,68,68,.15);color:var(--danger)}

/* Groups */
.group-card{background:var(--bg-elev);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;transition:transform .2s,box-shadow .2s}
.group-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.group-cover{height:120px;background:var(--gradient)}
.group-cover img{width:100%;height:100%;object-fit:cover}
.group-body{padding:14px}
.group-body h4{font-size:16px;font-weight:700;margin-bottom:4px}
.group-body .meta{font-size:13px;color:var(--text-3);margin-bottom:10px}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px}

/* Badges */
.badge-verified{display:inline-flex;width:16px;height:16px;color:var(--info);vertical-align:middle}

/* Progress */
.progress{height:6px;background:var(--bg-elev-2);border-radius:3px;overflow:hidden}
.progress-bar{height:100%;background:var(--gradient);border-radius:3px;transition:width .3s var(--ease)}

/* Tabs (generic) */
.tabs{display:flex;gap:4px;padding:6px;background:var(--bg-elev-2);border-radius:12px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;border-radius:9px;font-weight:600;font-size:14px;color:var(--text-2);cursor:pointer;white-space:nowrap;transition:all .2s}
.tab.active{background:var(--bg-elev);color:var(--text);box-shadow:var(--shadow-sm)}

/* Image preview grid */
.preview-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;margin-top:10px}
.preview-item{aspect-ratio:1;border-radius:10px;overflow:hidden;position:relative}
.preview-item img{width:100%;height:100%;object-fit:cover}
.preview-item .remove{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;width:22px;height:22px;border-radius:50%;display:grid;place-items:center;font-size:14px;cursor:pointer}

/* Animations */
.fade-in{animation:fadeIn .4s var(--ease)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scale-in{animation:scaleIn .3s var(--ease-spring)}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.slide-in-right{animation:slideInR .35s var(--ease)}
@keyframes slideInR{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* Dot indicator for unread */
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}

/* Code block */
.code-block{background:#0d1117;color:#c9d1d9;padding:16px;border-radius:12px;font-family:'SF Mono',Monaco,Consolas,monospace;font-size:13px;line-height:1.6;overflow-x:auto;max-height:480px;white-space:pre}
.code-block .kw{color:#ff7b72}.code-block .str{color:#a5d6ff}.code-block .com{color:#8b949e}
.sql-download-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px}

/* Backdrop for mobile sidebar */
.mobile-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;opacity:0;pointer-events:none;transition:opacity .25s}
.mobile-backdrop.active{opacity:1;pointer-events:auto}
@media(min-width:761px){.mobile-backdrop{display:none}}

/* Drawer */
.drawer{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--bg-elev);z-index:95;transform:translateX(-100%);transition:transform .3s var(--ease);padding:18px 12px;overflow-y:auto}
.drawer.open{transform:translateX(0)}
@media(min-width:761px){.drawer{display:none}}

/* Cover banner for landing */
.hero-bg{position:absolute;inset:0;z-index:-1;overflow:hidden}
.hero-bg::before{content:"";position:absolute;width:600px;height:600px;border-radius:50%;background:var(--gradient);filter:blur(120px);opacity:.25;top:-200px;right:-100px;animation:float 12s ease-in-out infinite}
.hero-bg::after{content:"";position:absolute;width:500px;height:500px;border-radius:50%;background:var(--accent);filter:blur(120px);opacity:.18;bottom:-150px;left:-100px;animation:float 15s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(40px,30px)}}

const Utils = {
  uid: () => 'id-' + Math.random().toString(36).slice(2, 11) + Date.now().toString(36),
  uuid: () => {

    return '279bb233-22c0-468e-9f54-8398293a017e'.replace(/[xy]/g,(c,r)=>('x'===c?(r=Math.random()*16|0):(r&0x3|0x8)).toString(16));
  },
  fmtTime(ts) {
    const d = new Date(ts), now = Date.now(), diff = (now - d.getTime())/1000;
    if (diff < 60) return 'just now';
    if (diff < 3600) return Math.floor(diff/60)+'m';
    if (diff < 86400) return Math.floor(diff/3600)+'h';
    if (diff < 604800) return Math.floor(diff/86400)+'d';
    if (diff < 2592000) return Math.floor(diff/604800)+'w';
    return d.toLocaleDateString(undefined,{month:'short',day:'numeric',year: d.getFullYear()!==new Date().getFullYear()?'numeric':undefined});
  },
  fmtCount(n) {
    if (n < 1000) return ''+n;
    if (n < 1e6) return (n/1e3).toFixed(n<1e4?1:0)+'K';
    return (n/1e6).toFixed(1)+'M';
  },
  escape(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  },
  linkify(text) {
    return Utils.escape(text)
      .replace(/(^|\s)#(\w+)/g, '$1<span class="hashtag" data-tag="$2">#$2</span>')
      .replace(/(^|\s)@(\w+)/g, '$1<span class="mention" data-user="$2">@$2</span>')

  },
  debounce(fn, ms = 250) {
    let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
  },
  throttle(fn, ms = 250) {
    let last = 0, t; return (...a) => {
      const now = Date.now(); const rem = ms - (now - last);
      if (rem <= 0) { last = now; fn(...a); }
      else { clearTimeout(t); t = setTimeout(() => { last = Date.now(); fn(...a); }, rem); }

    a.href = url; a.download = filename; document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  },
  hashString(s) {
    let h = 0; for (let i=0;i<s.length;i++) { h = ((h<<5)-h) + s.charCodeAt(i); h|=0; }

    return (key, limit = 10, windowMs = 60000) => {
      const now = Date.now();
      const b = buckets.get(key) || { count: 0, reset: now + windowMs };
      if (now > b.reset) { b.count = 0; b.reset = now + windowMs; }
      b.count++; buckets.set(key, b);
      return b.count <= limit;

  csrfToken() {
    if (!sessionStorage.getItem('csrf')) {

create or replace function public.handle_new_user()
returns trigger language plpgsql security definer as $$ begin
  insert into public.profiles (id, username, full_name, avatar_url)
  values (
    new.id,
    coalesce(new.raw_user_meta_data->>'username',
             'user_' || substring(new.id::text, 1, 8)),
    coalesce(new.raw_user_meta_data->>'full_name',
             split_part(coalesce(new.email,'user'), '@', 1)),

  )
  on conflict (id) do nothing;
  insert into public.user_settings (user_id) values (new.id) on conflict do nothing;
  return new;
end; $$;

-- Counter triggers
create or replace function public.increment_counter()
returns trigger language plpgsql as $$ begin
  if tg_op = 'INSERT' then
    if tg_table_name = 'comments' then
      update public.posts set comments_count = comments_count + 1 where id = new.post_id;
    elsif tg_table_name = 'reactions' and new.target_type = 'post' then
      update public.posts set likes_count = likes_count + 1 where id = new.target_id;
    elsif tg_table_name = 'followers' then
      update public.profiles set following_count = following_count + 1 where id = new.follower_id;
      update public.profiles set followers_count = followers_count + 1 where id = new.following_id;
    elsif tg_table_name = 'posts' then
      update public.profiles set posts_count = posts_count + 1 where id = new.author_id;
    end if;
    return new;
  elsif tg_op = 'DELETE' then
    if tg_table_name = 'comments' then
      update public.posts set comments_count = greatest(0, comments_count - 1) where id = old.post_id;
    elsif tg_table_name = 'reactions' and old.target_type = 'post' then
      update public.posts set likes_count = greatest(0, likes_count - 1) where id = old.target_id;
    elsif tg_table_name = 'followers' then
      update public.profiles set following_count = greatest(0, following_count - 1) where id = old.follower_id;
      update public.profiles set followers_count = greatest(0, followers_count - 1) where id = old.following_id;
    elsif tg_table_name = 'posts' then
      update public.profiles set posts_count = greatest(0, posts_count - 1) where id = old.author_id;
    end if;
    return old;
  end if;
  return null;
end; $$;

    this.listeners.get(key).add(fn);
    return () => this.listeners.get(key).delete(fn);
  },
  emit(key, payload) {
    const set = this.listeners.get(key);
    if (set) set.forEach(fn => fn(payload));
  },
  set(key, value) {
    this.state[key] = value;
    this.emit(key, value);
  },
  patch(key, partial) {
    Object.assign(this.state[key], partial);
    this.emit(key, this.state[key]);
  },
  get(key) { return this.state[key]; }
};

    const p = { ...posts[idx] };
    if (p.myReaction === type) {
      p.reactions[type] = Math.max(0, (p.reactions[type]||0) - 1);
      p.myReaction = null;
      p.likes_count = Math.max(0, p.likes_count - 1);
    } else {
      if (p.myReaction) {
        p.reactions[p.myReaction] = Math.max(0, (p.reactions[p.myReaction]||0) - 1);
      } else {
        p.likes_count += 1;
      }
      p.reactions[type] = (p.reactions[type]||0) + 1;
      p.myReaction = type;
    }
    posts[idx] = p;
    Store.set('posts', posts);
    if (SUPABASE_ENABLED) {
      // upsert reaction
    }
  },
  async toggleBookmark(postId) {
    const posts = [...Store.get('posts')];
    const idx = posts.findIndex(p => p.id === postId);
    if (idx < 0) return;
    posts[idx] = { ...posts[idx], bookmarked: !posts[idx].bookmarked };
    Store.set('posts', posts);
  },
  async addComment(postId, body) {
    const posts = [...Store.get('posts')];
    const idx = posts.findIndex(p => p.id === postId);
    if (idx < 0) return;
    const comment = {
      id: Utils.uid(), author_id: DEMO_DATA.currentUserId,
      author: DEMO_DATA.users.find(u => u.id === DEMO_DATA.currentUserId),
      body, created_at: new Date().toISOString()
    };
    posts[idx] = { ...posts[idx], comments: [...(posts[idx].comments||[]), comment], comments_count: (posts[idx].comments_count||0)+1 };
    Store.set('posts', posts);
  },
  async search(query) {
    if (!query.trim()) return null;
    if (SUPABASE_ENABLED) {
      // search across tables
    }
    const q = query.toLowerCase();
    return {
      users: DEMO_DATA.users.filter(u =>
        u.full_name.toLowerCase().includes(q) || u.username.toLowerCase().includes(q)),
      posts: Store.get('posts').filter(p => p.body.toLowerCase().includes(q)),
      tags: ['WebComponents', 'LoFiBeats', 'Glassmorphism'].filter(t => t.toLowerCase().includes(q)).map(t => ({ tag: t, count: Math.floor(Math.random()*10000) }))
    };
  }
};

/* ---------------- Auth Module ---------------- */
const Auth = {
  async init() {
    if (SUPABASE_ENABLED && supabaseClient) {
      const { data: { session } } = await supabaseClient.auth.getSession();
      if (session) {
        await this.restoreSession(session);
        supabaseClient.auth.onAuthStateChange((e, sess) => {
          if (e === 'SIGNED_OUT') this.logout();
          else if (e === 'SIGNED_IN' && sess) this.restoreSession(sess);
        });
      }
    } else {
      // Demo auto-login
      const user = DEMO_DATA.users.find(u => u.id === DEMO_DATA.currentUserId);
      Store.set('user', user);
      Store.set('profile', user);
    }
  },
  async restoreSession(session) {
    const { data: profile } = await supabaseClient
      .from('profiles').select('*').eq('id', session.user.id).single();
    Store.set('user', session.user);
    Store.set('profile', profile);
  },
  async signup({ email, password, full_name, username }) {
    if (!Utils.validateEmail(email)) throw new Error('Invalid email');
    if (password.length < 8) throw new Error('Password must be at least 8 characters');
    if (!Utils.validateUsername(username)) throw new Error('Username must be 3-20 alphanumeric/underscore characters');
    if (!Security.rateLimit('signup', 5, 60000)) throw new Error('Too many attempts. Try again later.');
    if (SUPABASE_ENABLED) {
      const { data, error } = await supabaseClient.auth.signUp({
        email, password, options: { data: { full_name, username } }
      });
      if (error) throw error;
      Toast.show('success', 'Check your email', 'We sent a verification link to ' + email);
      return data;
    }
    // Demo
    await new Promise(r => setTimeout(r, 800));
    const newUser = { id: Utils.uuid(), email, username, full_name, avatar_url: '', followers_count: 0, following_count: 0, posts_count: 0 };
    Store.set('user', newUser);
    Store.set('profile', newUser);
    Toast.show('success', 'Welcome to Orbit!', 'Your account has been created.');
    Router.navigate('/');
    return newUser;
  },
  async login({ email, password, remember }) {
    if (!Utils.validateEmail(email)) throw new Error('Invalid email');
    if (!Security.rateLimit('login', 8, 60000)) throw new Error('Too many login attempts. Try later.');
    if (SUPABASE_ENABLED) {
      const { data, error } = await supabaseClient.auth.signInWithPassword({
        email, password
      });
      if (error) throw error;
      await this.restoreSession(data.session);
      Toast.show('success', 'Welcome back!', '');
      Router.navigate('/');
      return data;
    }
    // Demo
    await new Promise(r => setTimeout(r, 600));
    const user = DEMO_DATA.users.find(u => u.id === DEMO_DATA.currentUserId);
    Store.set('user', user);
    Store.set('profile', user);
    Toast.show('success', 'Welcome back!', '');
    Router.navigate('/');
    return { user };
  },
  async forgotPassword(email) {
    if (!Utils.validateEmail(email)) throw new Error('Invalid email');
    if (SUPABASE_ENABLED) {
      const { error } = await supabaseClient.auth.resetPasswordForEmail(email);
      if (error) throw error;
    }
    await new Promise(r => setTimeout(r, 600));
    Toast.show('success', 'Reset link sent', 'Check your inbox for instructions.');
  },
  async oauth(provider) {
    if (SUPABASE_ENABLED) {
      await supabaseClient.auth.signInWithOAuth({ provider, redirectTo: window.location.origin });
    } else {
      Toast.show('info', 'Demo mode', 'OAuth requires Supabase configuration.');
    }
  },
  async logout() {
    if (SUPABASE_ENABLED && supabaseClient) await supabaseClient.auth.signOut();
    Store.set('user', null);
    Store.set('profile', null);
    Router.navigate('/login');
  },
  isLoggedIn() { return !!Store.get('user'); }
};

          <div class="modal-body">${body}</div>
          ${footer ? `<div class="modal-footer">${footer}</div>` : ''}
        </div>
      </div>`;
    document.getElementById('modal-container').insertAdjacentHTML('beforeend', html);
    const el = document.getElementById(id);
    requestAnimationFrame(() => el.classList.add('active'));
    el.addEventListener('click', e => {
      if (e.target === el || e.target.closest('[data-close]')) Components.closeModal(id);
    });
    return id;
  },
  closeModal(id) {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.remove('active');
    setTimeout(() => el.remove(), 250);
  },
  toast(title, message, type = 'info') { Toast.show(type, title, message); }
};

/* ---------------- Toast Module ---------------- */
const Toast = {
  show(type, title, message) {
    const icons = { success: Components.icon('check'), error: Components.icon('x'), info: Components.icon('bell'), warning: Components.icon('bell') };
    const id = 'toast-' + Utils.uid();
    const html = `
      <div class="toast ${type}" id="${id}">
        <div class="icon">${icons[type] || icons.info}</div>
        <div class="content">
          <div class="title">${Utils.escape(title)}</div>
          ${message ? `<div class="message">${Utils.escape(message)}</div>` : ''}
        </div>
      </div>`;
    document.getElementById('toast-container').insertAdjacentHTML('beforeend', html);
    const el = document.getElementById(id);
    setTimeout(() => {
      el.classList.add('removing');
      setTimeout(() => el.remove(), 300);
    }, 4000);
  }
};

/* ---------------- Router Module (History API) ---------------- */
const Router = {
  routes: {},
  current: '/',
  before: null,
  init() {
    window.addEventListener('popstate', () => this.handle(location.pathname));
    document.addEventListener('click', e => {
      const a = e.target.closest('a[data-link]');
      if (a) {
        e.preventDefault();
        this.navigate(a.getAttribute('href'));
      }
    });
    this.handle(location.pathname);
  },
  register(path, handler) { this.routes[path] = handler; },
  navigate(path) {
    if (path === this.current) return;
    history.pushState({}, '', path);
    this.handle(path);
  },
  async handle(path) {
    this.current = path;
    if (this.before) {
      const redirect = await this.before(path);
      if (redirect) { this.navigate(redirect); return; }
    }
    // Match dynamic routes
    let handler = this.routes[path];
    let params = {};
    if (!handler) {
      for (const route of Object.keys(this.routes)) {
        const pattern = route.replace(/:[^/]+/g, '([^/]+)');
        if (pattern === route) continue;
        const re = new RegExp('^' + pattern + '$');
        const m = path.match(re);
        if (m) {
          const keys = route.match(/:[^/]+/g) || [];
          keys.forEach((k, i) => params[k.slice(1)] = m[i + 1]);
          handler = this.routes[route];
          break;
        }
      }
    }
    window.scrollTo(0, 0);
    if (handler) await handler(params);
    else await this.routes['/404']();
  }
};

/* ---------------- Media / Upload Module ---------------- */
const Media = {
  async upload(file, bucket = 'media', onProgress) {
    if (!Security.rateLimit('upload-' + bucket, 30, 60000)) {
      throw new Error('Upload rate limit exceeded');
    }
    if (file.size > 50 * 1024 * 1024) throw new Error('File too large (max 50MB)');
    const ext = file.name.split('.').pop().toLowerCase();
    const path = `${Utils.uuid()}.${ext}`;
    if (SUPABASE_ENABLED && supabaseClient) {
      const { data, error } = await supabaseClient.storage.from(bucket)
        .upload(path, file, { upsert: false, contentType: file.type });
      if (error) throw error;
      const { data: { publicUrl } } = supabaseClient.storage.from(bucket).getPublicUrl(path);
      return { url: publicUrl, path };
    }
    // Demo: use object URL
    await new Promise(r => setTimeout(r, 600));
    const url = URL.createObjectURL(file);
    return { url, path };
  },
  async compressImage(file, maxDim = 1920, quality = 0.85) {
    if (!file.type.startsWith('image/')) return file;
    return new Promise(resolve => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.readAsDataURL(file);
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(blob => {
          resolve(new File([blob], file.name, { type: 'image/jpeg', lastModified: Date.now() }));
        }, 'image/jpeg', quality);
      };
      img.onerror = () => resolve(file);
    });
  },
  preview(file) {
    return URL.createObjectURL(file);
  }
};

  if (res.tags.length) {
    html += `<div class="search-section"><div class="search-section-title">Hashtags</div>`;
    res.tags.forEach(t => {
      html += `<div class="search-item" onclick="document.getElementById('global-search').value='#${t.tag}';document.getElementById('search-results').classList.remove('active')">
        ${Components.icon('hash' in Components.icons ? 'hash' : 'search')}

        <div style="font-size:11px;color:var(--text-3)">${Utils.fmtCount(t.count)} posts</div></div>
      </div>`;
    });
    html += `</div>`;
  }
  if (!html) html = `<div style="padding:24px;text-align:center;color:var(--text-3);font-size:14px">No results for "${Utils.escape(q)}"</div>`;

};

Views.contextMenu = (x, y, items) => {
  document.querySelectorAll('.context-menu').forEach(m => m.remove());
  const id = 'ctx-' + Utils.uid();
  const html = `<div class="context-menu" id="${id}" style="left:${x}px;top:${y}px">
    ${items.map((it, i) => `<div class="context-item ${it.danger ? 'danger' : ''}" data-idx="${i}">${Components.icon(it.icon)}<span>${Utils.escape(it.label)}</span></div>`).join('')}
  </div>`;
  document.body.insertAdjacentHTML('beforeend', html);
  const menu = document.getElementById(id);
  // Adjust position
  const rect = menu.getBoundingClientRect();
  if (rect.right > window.innerWidth) menu.style.left = (window.innerWidth - rect.width - 10) + 'px';
  if (rect.bottom > window.innerHeight) menu.style.top = (window.innerHeight - rect.height - 10) + 'px';
  menu.querySelectorAll('[data-idx]').forEach(el => {
    el.addEventListener('click', () => {
      const item = items[+el.dataset.idx];
      item.action?.();
      menu.remove();
    });
  });
  setTimeout(() => document.addEventListener('click', function closer() {
    menu.remove(); document.removeEventListener('click', closer);
  }), 0);
};

Views.loadFeed = async (filter = 'for-you') => {
  const list = document.getElementById('feed-list');
  if (!list) return;
  try {
    const posts = await API.getFeed(0, 10);
    if (!posts.length) {
      list.innerHTML = Views.emptyState('explore', 'No posts yet', 'Be the first to share something with your orbit!');
      return;
    }
    list.innerHTML = posts.map(Views.postCard).join('');
    Views.bindPostActions();
  } catch (e) {
    list.innerHTML = `<div class="card pad">Failed to load: ${Utils.escape(e.message)}</div>`;
  }
};

Views.setupInfiniteScroll = () => {
  const sentinel = document.getElementById('feed-sentinel');
  if (!sentinel) return;
  let offset = 10, loading = false, ended = false;
  const obs = new IntersectionObserver(async entries => {
    if (entries[0].isIntersecting && !loading && !ended) {
      loading = true;
      const posts = await API.getFeed(offset, 10);
      if (!posts.length) { ended = true; sentinel.innerHTML = '<div style="padding:14px">You\'re all caught up ✨</div>'; obs.disconnect(); return; }
      const list = document.getElementById('feed-list');
      list.insertAdjacentHTML('beforeend', posts.map(Views.postCard).join(''));
      Views.bindPostActions();
      offset += 10; loading = false;
    }
  });
  obs.observe(sentinel);
};

Views.postMedia = (post) => {
  if (!post.media || !post.media.length) return '';
  const items = post.media.slice(0, 4);
  const more = post.media.length > 4;
  if (items.length === 1) {
    const m = items[0];
    return `<div class="post-media single"><div class="media-item">${m.type === 'video' ? `<video controls src="${Utils.escape(m.url)}"></video>` : `<img loading="lazy" src="${Utils.escape(m.url)}" alt="">`}</div></div>`;
  }
  let cls = `post-media grid-${items.length}`;
  if (items.length === 3) cls = 'post-media grid-3';
  if (items.length >= 4) cls = 'post-media grid-4';
  return `<div class="${cls}">${items.map((m, i) => `
    <div class="media-item">
      ${m.type === 'video' ? `<video controls src="${Utils.escape(m.url)}"></video>` : `<img loading="lazy" src="${Utils.escape(m.url)}" alt="">`}
      ${more && i === 3 ? `<div class="more-overlay">+${post.media.length - 4}</div>` : ''}
    </div>`).join('')}</div>`;
};

Views.postPoll = (post) => {

Views.bindPostActions = () => {
  // Reaction picker
  document.querySelectorAll('[data-react]').forEach(el => {
    let timer;
    const picker = el.querySelector('.reaction-picker');
    el.addEventListener('mouseenter', () => { clearTimeout(timer); if (picker) picker.classList.add('active'); });
    el.addEventListener('mouseleave', () => { timer = setTimeout(() => picker?.classList.remove('active'), 300); });
    el.addEventListener('click', e => {
      if (e.target.closest('.reaction-picker')) return;
      API.toggleReaction(el.dataset.react, 'like');
    });
  });
  document.querySelectorAll('[data-react-type]').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      API.toggleReaction(b.dataset.postId, b.dataset.reactType);
      b.closest('.reaction-picker').classList.remove('active');
    });
  });
  // Comment toggle
  document.querySelectorAll('[data-comment]').forEach(el => {
    el.addEventListener('click', () => {
      const box = document.querySelector(`[data-comments="${el.dataset.comment}"]`);
      if (box) {
        box.style.display = box.style.display === 'none' ? 'block' : 'none';
        if (box.style.display === 'block') {
          const input = box.querySelector('input');
          setTimeout(() => input?.focus(), 100);
        }
      }
    });
  });
  // Comment input
  document.querySelectorAll('[data-comment-input]').forEach(inp => {
    inp.addEventListener('keypress', async e => {
      if (e.key === 'Enter' && inp.value.trim()) {
        await API.addComment(inp.dataset.commentInput, inp.value.trim());
        inp.value = '';
        // Re-render that post
        const posts = Store.get('posts');
        const p = posts.find(x => x.id === inp.dataset.commentInput);
        if (p) {
          const list = document.querySelector(`[data-comment-list="${p.id}"]`);
          if (list) list.insertAdjacentHTML('beforeend', Views.commentItem(p.comments[p.comments.length-1]));
        }
      }
    });
  });
  // Share
  document.querySelectorAll('[data-share]').forEach(el => {
    el.addEventListener('click', () => {
      const url = location.origin + '/post/' + el.dataset.share;
      Utils.copy(url);
      Toast.show('success', 'Link copied', 'Share it anywhere!');
    });
  });
  // Bookmark
  document.querySelectorAll('[data-bookmark]').forEach(el => {
    el.addEventListener('click', async () => {
      await API.toggleBookmark(el.dataset.bookmark);
      const p = Store.get('posts').find(x => x.id === el.dataset.bookmark);
      el.classList.toggle('active', p?.bookmarked);
      el.querySelector('span').textContent = p?.bookmarked ? 'Saved' : 'Save';
    });
  });
  // Post menu
  document.querySelectorAll('[data-post-menu]').forEach(el => {
    el.addEventListener('click', e => {
      e.stopPropagation();
      const r = el.getBoundingClientRect();
      const isMine = true; // simplified
      Views.contextMenu(r.right - 180, r.bottom + 6, [
        { icon: 'link', label: 'Copy link', action: () => { Utils.copy(location.origin + '/post/' + el.dataset.postMenu); Toast.show('success','Copied',''); } },
        { icon: 'bookmark', label: 'Save post', action: () => API.toggleBookmark(el.dataset.postMenu) },
        { icon: 'eye', label: 'Hide post', action: () => Toast.show('info','Hidden','Post removed from feed') },
        ...(isMine ? [{ icon: 'edit', label: 'Edit post', action: () => Toast.show('info','Coming soon','') }] : []),
        ...(isMine ? [{ icon: 'trash', label: 'Delete post', action: () => Toast.show('info','Coming soon',''), danger: true }] : [{ icon: 'shield', label: 'Report post', action: () => Views.openReportModal(el.dataset.postMenu), danger: true }])
      ]);
    });
  });
  // Poll
  document.querySelectorAll('[data-poll-option]').forEach(opt => {
    opt.addEventListener('click', async () => {
      const post = Store.get('posts').find(p => p.id === opt.dataset.postId);
      if (!post || !post.poll) return;
      post.poll.votes[opt.dataset.pollOption]++;
      // Update UI
      const pollEl = document.querySelector(`[data-poll="${post.id}"]`);
      pollEl.innerHTML = Views.postPoll(post);
      Views.bindPostActions();
      Toast.show('success', 'Vote recorded', '');
    });
  });
  // Hashtag / mention clicks
  document.querySelectorAll('.hashtag, .mention').forEach(el => {
    el.addEventListener('click', () => {
      const q = el.classList.contains('hashtag') ? '#' + el.dataset.tag : '@' + el.dataset.user;
      document.getElementById('global-search').value = q;
      Router.navigate('/explore?q=' + encodeURIComponent(q));
    });
  });
};

        <button class="composer-action" style="flex:0 0 auto;padding:10px 14px">${Components.icon('emoji')}<span>Feeling</span></button>
        <input type="file" id="file-input" accept="image/*,video/*" multiple style="display:none">
      </div>
    `,
    footer: `
      <button class="btn btn-ghost" data-close="${0}">Cancel</button>
      <button class="btn btn-primary" id="post-submit">Post</button>
    `
  });
  // Bindings
  const fileInput = document.getElementById('file-input');
  const preview = document.getElementById('composer-preview');
  document.getElementById('add-photo').addEventListener('click', () => { fileInput.accept = 'image/*'; fileInput.click(); });
  document.getElementById('add-video').addEventListener('click', () => { fileInput.accept = 'video/*'; fileInput.click(); });
  fileInput.addEventListener('change', async e => {
    for (const f of e.target.files) {
      const compressed = await Media.compressImage(f);
      const url = URL.createObjectURL(compressed);
      mediaFiles.push({ file: compressed, url, type: f.type.startsWith('video') ? 'video' : 'image' });
    }
    renderPreview();
  });
  function renderPreview() {
    preview.innerHTML = mediaFiles.map((m, i) => `
      <div class="preview-item">
        ${m.type === 'video' ? `<video src="${m.url}"></video>` : `<img src="${m.url}">`}
        <div class="remove" data-remove="${i}">×</div>
      </div>`).join('');
    preview.querySelectorAll('[data-remove]').forEach(r => r.addEventListener('click', () => {
      mediaFiles.splice(+r.dataset.remove, 1); renderPreview();
    }));
  }
  // Poll
  const pollBox = document.getElementById('composer-poll');
  const pollList = document.getElementById('poll-options-list');
  function renderPollOptions() {
    pollList.innerHTML = pollOptions.map((o, i) => `
      <div style="display:flex;gap:8px;margin-bottom:8px">
        <input class="form-input" placeholder="Option ${i+1}" value="${Utils.escape(o)}" data-poll-opt="${i}">
        ${pollOptions.length > 2 ? `<button class="btn btn-ghost btn-sm" data-rm-opt="${i}">×</button>` : ''}
      </div>`).join('');
    pollList.querySelectorAll('[data-poll-opt]').forEach(inp => inp.addEventListener('input', e => pollOptions[+inp.dataset.pollOpt] = e.target.value));
    pollList.querySelectorAll('[data-rm-opt]').forEach(b => b.addEventListener('click', () => { pollOptions.splice(+b.dataset.rmOpt, 1); renderPollOptions(); }));
  }
  document.getElementById('toggle-poll').addEventListener('click', () => {
    pollBox.style.display = pollBox.style.display === 'none' ? 'block' : 'none';
    renderPollOptions();
  });
  document.getElementById('add-poll-option').addEventListener('click', () => { if (pollOptions.length < 6) { pollOptions.push(''); renderPollOptions(); } });
  // Submit
  document.getElementById('post-submit').addEventListener('click', async () => {
    const body = document.getElementById('composer-body').value.trim();
    if (!body && !mediaFiles.length && pollBox.style.display !== 'block') {
      Toast.show('warning', 'Empty post', 'Write something or add media first'); return;
    }
    const btn = document.getElementById('post-submit');
    btn.disabled = true; btn.innerHTML = '<span class="spinner" style="width:18px;height:18px;border-width:2px"></span> Posting...';
    try {
      const payload = {
        body: Security.validateInput(body, 5000),
        type: mediaFiles.length ? (mediaFiles[0].type === 'video' ? 'video' : 'photo') : (pollBox.style.display === 'block' ? 'poll' : 'text'),
        media: mediaFiles.map(m => ({ url: m.url, type: m.type })),
        visibility: document.querySelector('.form-select').value,
        ...(pollBox.style.display === 'block' ? { poll: { question: document.getElementById('poll-question').value, options: pollOptions.filter(Boolean), votes: pollOptions.filter(Boolean).map(() => 0) } } : {})
      };
      await API.createPost(payload);
      Components.closeModal(id);
      Toast.show('success', 'Posted!', 'Your post is now live');
      if (Router.current === '/' || Router.current === '/feed') Views.loadFeed();
      else Router.navigate('/');
    } catch (e) {
      Toast.show('error', 'Failed', e.message);
    } finally {
      btn.disabled = false; btn.innerHTML = 'Post';
    }
  });
};

Views.openStoryViewer = (userId) => {
  const user = (Store.get('friends') || []).find(f => f.id === userId);
  if (!user) return;
  let idx = 0;
  const stories = [1, 2, 3].map(i => `https://picsum.photos/seed/story${userId}${i}/800/1400`);
  const id = 'story-' + Utils.uid();
  const html = `
    <div class="modal-backdrop active" id="${id}" style="background:rgba(0,0,0,.95);padding:0">
      <div style="max-width:480px;width:100%;height:100vh;margin:0 auto;position:relative;display:flex;flex-direction:column">
        <div style="padding:14px;display:flex;gap:10px;align-items:center;position:absolute;top:0;left:0;right:0;z-index:2;background:linear-gradient(to bottom,rgba(0,0,0,.6),transparent)">
          ${Components.avatar(user, 36)}
          <div style="color:#fff"><div style="font-weight:700">${Utils.escape(user.full_name)}</div>
          <div style="font-size:12px;opacity:.8">${Utils.fmtTime(Date.now() - 3600000)}</div></div>
          <button class="modal-close" data-close="${id}" style="margin-left:auto;color:#fff">${Components.icon('x')}</button>
        </div>
        <div style="position:absolute;top:0;left:0;right:0;height:3px;background:rgba(255,255,255,.2);z-index:3">
          <div id="story-progress" style="height:100%;background:#fff;width:0;transition:width 5s linear"></div>
        </div>
        <img id="story-img" src="${stories[0]}" style="width:100%;height:100%;object-fit:cover">
        <div style="position:absolute;bottom:0;left:0;right:0;padding:20px;background:linear-gradient(to top,rgba(0,0,0,.7),transparent)">
          <input style="width:100%;padding:11px 16px;border-radius:22px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:#fff" placeholder="Reply...">
        </div>
        <button id="story-prev" style="position:absolute;left:0;top:0;bottom:0;width:30%;cursor:pointer;background:transparent;border:none"></button>
        <button id="story-next" style="position:absolute;right:0;top:0;bottom:0;width:30%;cursor:pointer;background:transparent;border:none"></button>
      </div>
    </div>`;
  document.getElementById('modal-container').insertAdjacentHTML('beforeend', html);
  const el = document.getElementById(id);
  const img = document.getElementById('story-img');
  const prog = document.getElementById('story-progress');
  let timer;
  function go(n) {
    idx = n;
    if (idx >= stories.length) { Components.closeModal(id); return; }
    if (idx < 0) idx = 0;
    img.src = stories[idx];
    prog.style.transition = 'none'; prog.style.width = '0';
    requestAnimationFrame(() => { prog.style.transition = 'width 5s linear'; prog.style.width = '100%'; });
    clearTimeout(timer);
    timer = setTimeout(() => go(idx + 1), 5000);
  }
  go(0);
  document.getElementById('story-next').addEventListener('click', () => go(idx + 1));
  document.getElementById('story-prev').addEventListener('click', () => go(idx - 1));
  el.addEventListener('click', e => { if (e.target === el || e.target.closest('[data-close]')) { clearTimeout(timer); Components.closeModal(id); } });
};

          <button class="icon-btn" id="send-msg" style="color:var(--primary)">${Components.icon('send')}</button>

    }, 1500);
  });
  chatMsgs.scrollTop = chatMsgs.scrollHeight;
};

Views.bindSettings = (sec) => {
  document.querySelectorAll('[data-set]').forEach(el => {
    el.addEventListener('change', () => {
      const key = el.dataset.set;
      const val = el.type === 'checkbox' ? el.checked : el.value;
      Store.patch('settings', { [key]: val });
      if (key === 'theme') App.setTheme(val);
      if (key === 'reduced_motion') document.documentElement.style.setProperty('--ease', val ? 'linear' : 'cubic-bezier(.4,0,.2,1)');
      if (key === 'large_text') document.documentElement.style.fontSize = val ? '17px' : '16px';
      Toast.show('success', 'Setting saved', '');
    });
  });
  document.getElementById('show-sql-settings')?.addEventListener('click', () => Views.openSQLModal());
};
